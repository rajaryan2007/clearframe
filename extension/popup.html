<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ClearFrame AI</title>
  <style>
    body {
      width: 320px;
      margin: 0;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #0c0c0e;
      color: #e4e4e7;
    }
    .container { display: flex; flex-direction: column; gap: 12px; }
    h1 { font-size: 18px; margin: 0; color: #10b981; font-weight: 800; display: flex; align-items: center; gap: 8px; }
    .status { font-size: 12px; color: #71717a; }
    .btn {
      background-color: #10b981;
      color: black;
      border: none;
      padding: 10px;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    #result {
      background: #18181b;
      padding: 12px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.5;
      display: none;
      border: 1px solid #27272a;
    }
    .loader {
      border: 2px solid #27272a;
      border-top: 2px solid #10b981;
      border-radius: 50%;
      width: 16px;
      height: 16px;
      animation: spin 1s linear infinite;
      display: none;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .score-badge {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 4px;
      font-weight: bold;
      font-size: 11px;
      margin-top: 8px;
    }
    .high { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); }
    .med { background: rgba(245, 158, 11, 0.1); color: #f59e0b; border: 1px solid rgba(245, 158, 11, 0.2); }
    .low { background: rgba(16, 185, 129, 0.1); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.2); }
  </style>
</head>
<body>
  <div class="container">
    <h1>ClearFrame AI</h1>
    <div class="status" id="status">Select text on page and click analyze.</div>
    <div id="loading" class="loader"></div>
    <button id="analyze-btn" class="btn">Analyze Selection</button>
    <div id="result">
      <div id="score-val"></div>
      <div id="bias-val" style="margin-top: 8px; opacity: 0.8;"></div>
      <hr style="border: 0; border-top: 1px solid #27272a; margin: 12px 0;">
      <div id="summary-val"></div>
      <a href="http://localhost:3000" target="_blank" style="display: block; margin-top: 12px; color: #10b981; font-size: 11px; text-decoration: none;">View full report →</a>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
