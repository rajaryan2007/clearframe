<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ClearFrame AI</title>
  <style>
    body {
      width: 320px;
      margin: 0;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #0c0c0e;
      color: #e4e4e7;
    }
    .container { display: flex; flex-direction: column; gap: 12px; }
    h1 { font-size: 18px; margin: 0; color: #10b981; font-weight: 800; display: flex; align-items: center; gap: 8px; }
    .status { font-size: 12px; color: #71717a; }
    .btn {
      background-color: #10b981;
      color: black;
      border: none;
      padding: 10px;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    #result {
      background: #09090b;
      padding: 16px;
      border-radius: 12px;
      font-size: 13px;
      line-height: 1.5;
      display: none;
      border: 1px solid #27272a;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.4);
    }
    .section-label {
      font-size: 9px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #71717a;
      margin-bottom: 8px;
      margin-top: 16px;
    }
    .section-label:first-child { margin-top: 0; }
    
    .emotion-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .emo-bar {
      height: 4px;
      background: #27272a;
      border-radius: 2px;
      overflow: hidden;
      margin-top: 4px;
    }
    .emo-fill { height: 100%; transition: width 1s; }
    
    .context-list {
      margin: 0;
      padding: 0;
      list-style: none;
      font-size: 11px;
      color: #a1a1aa;
    }
    .context-list li {
      margin-bottom: 4px;
      padding-left: 12px;
      position: relative;
    }
    .context-list li::before {
      content: "";
      position: absolute;
      left: 0;
      top: 6px;
      width: 4px;
      height: 4px;
      background: #10b981;
      border-radius: 50%;
      opacity: 0.5;
    }

    .rewrite-box {
      background: rgba(16, 185, 129, 0.03);
      border: 1px solid rgba(16, 185, 129, 0.1);
      padding: 10px;
      border-radius: 8px;
      font-style: italic;
      color: #d1d1d6;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>ClearFrame AI</h1>
    <div class="status" id="status">Select text on page and click analyze.</div>
    <div id="loading" class="loader"></div>
    <button id="analyze-btn" class="btn">Analyze Selection</button>
    
    <div id="history-container" style="display: none; margin-top: 16px; border-top: 1px solid #27272a; padding-top: 12px;">
      <div class="section-label">Recent Analyses (Local)</div>
      <div id="history-list" style="display: flex; flex-direction: column; gap: 8px;"></div>
    </div>

    <div id="result">

      <div id="score-val"></div>
      
      <div class="section-label">Bias Vector</div>
      <div id="bias-val" style="font-weight: 700; color: white;"></div>
      <div id="summary-val" style="font-size: 11px; color: #71717a; margin-top: 4px;"></div>

      <div class="section-label">Sentiment Resonance</div>
      <div class="emotion-grid">
        <div>
          <span style="font-size: 10px;">Fear</span>
          <div class="emo-bar"><div id="fear-fill" class="emo-fill" style="background: #a855f7;"></div></div>
        </div>
        <div>
          <span style="font-size: 10px;">Anger</span>
          <div class="emo-bar"><div id="anger-fill" class="emo-fill" style="background: #ef4444;"></div></div>
        </div>
        <div>
          <span style="font-size: 10px;">Hope</span>
          <div class="emo-bar"><div id="hope-fill" class="emo-fill" style="background: #10b981;"></div></div>
        </div>
        <div>
          <span style="font-size: 10px;">Sadness</span>
          <div class="emo-bar"><div id="sadness-fill" class="emo-fill" style="background: #3b82f6;"></div></div>
        </div>
      </div>

      <div class="section-label">Missing Perspectives</div>
      <ul id="context-list" class="context-list"></ul>

      <div class="section-label">Objective Reconstruction</div>
      <div id="rewrite-val" class="rewrite-box"></div>

      <a href="https://clearframe-beige.vercel.app" target="_blank" style="display: block; margin-top: 16px; color: #10b981; font-size: 10px; text-decoration: none; text-align: center; font-weight: bold; opacity: 0.6;">DASHBOARD →</a>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
